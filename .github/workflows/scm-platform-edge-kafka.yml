name: SCM Platform Edge Kafka E2E

on:
  push:
    branches: [cursor/scm-wave, main, master]
    paths:
      - "scm-platform/**"
      - ".github/workflows/scm-platform-edge-kafka.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "scm-platform/**"
      - ".github/workflows/scm-platform-edge-kafka.yml"
  workflow_dispatch:

jobs:
  e2e-edge-kafka-stack:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: scm-platform
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: scm-platform/**/pom.xml

      - name: Check Docker Compose availability
        run: |
          docker version
          docker compose version

      - name: Validate edge + Kafka compose config
        run: docker compose -f docker-compose.yml -f docker-compose.full.yml -f docker-compose.edge.yml -f docker-compose.kafka-overlay.yml -f docker-compose.edge-kafka.yml config --quiet

      - name: Build OpenResty gateway image
        run: docker compose -f docker-compose.yml -f docker-compose.full.yml -f docker-compose.edge.yml -f docker-compose.kafka-overlay.yml -f docker-compose.edge-kafka.yml build scm-gateway-jwt

      - name: Build SCM service images
        run: docker compose -f docker-compose.yml -f docker-compose.full.yml -f docker-compose.edge.yml -f docker-compose.kafka-overlay.yml -f docker-compose.edge-kafka.yml build scm-erp scm-oms scm-wms scm-tms scm-mock-pay scm-mock-carrier scm-mock-inventory

      - name: Start MySQL and Redis infrastructure
        run: |
          for attempt in 1 2; do
            if docker compose -f docker-compose.yml -f docker-compose.full.yml -f docker-compose.edge.yml -f docker-compose.kafka-overlay.yml -f docker-compose.edge-kafka.yml up -d mysql-erp mysql-oms mysql-wms mysql-tms redis; then
              exit 0
            fi
            echo "MySQL/Redis infrastructure start failed (attempt ${attempt})" >&2
            docker compose -f docker-compose.yml -f docker-compose.full.yml -f docker-compose.edge.yml -f docker-compose.kafka-overlay.yml -f docker-compose.edge-kafka.yml ps mysql-erp mysql-oms mysql-wms mysql-tms redis || true
            docker compose -f docker-compose.yml -f docker-compose.full.yml -f docker-compose.edge.yml -f docker-compose.kafka-overlay.yml -f docker-compose.edge-kafka.yml logs --tail=120 mysql-erp mysql-oms mysql-wms mysql-tms redis || true
            docker compose -f docker-compose.yml -f docker-compose.full.yml -f docker-compose.edge.yml -f docker-compose.kafka-overlay.yml -f docker-compose.edge-kafka.yml down -v --remove-orphans || true
            sleep 10
          done
          exit 1

      - name: Start Kafka infrastructure
        run: docker compose -f docker-compose.yml -f docker-compose.full.yml -f docker-compose.edge.yml -f docker-compose.kafka-overlay.yml -f docker-compose.edge-kafka.yml up -d kafka

      - name: Wait for Kafka port
        run: |
          for _ in $(seq 1 80); do
            (echo >"/dev/tcp/127.0.0.1/9092") >/dev/null 2>&1 && exit 0
            sleep 3
          done
          exit 1

      - name: Start Keycloak infrastructure
        run: docker compose -f docker-compose.yml -f docker-compose.full.yml -f docker-compose.edge.yml -f docker-compose.kafka-overlay.yml -f docker-compose.edge-kafka.yml up -d keycloak

      - name: Wait for Keycloak token endpoint
        run: |
          for _ in $(seq 1 80); do
            http_code=$(curl -s -o /tmp/keycloak-token.json -w "%{http_code}" \
              --connect-timeout 2 --max-time 5 \
              -X POST http://127.0.0.1:8180/realms/scm/protocol/openid-connect/token \
              -H "Content-Type: application/x-www-form-urlencoded" \
              --data "grant_type=password&client_id=scm-gateway&username=e2e-user&password=e2e-pass&scope=openid" || true)
            if [ "$http_code" = "200" ]; then
              exit 0
            fi
            sleep 3
          done
          echo "Keycloak token endpoint timeout" >&2
          docker compose -f docker-compose.yml -f docker-compose.full.yml -f docker-compose.edge.yml -f docker-compose.kafka-overlay.yml -f docker-compose.edge-kafka.yml logs --tail=200 keycloak
          printf '%s\n' "Last token response:"
          sed -e 's/.*//g' /tmp/keycloak-token.json >/dev/null 2>&1 || true
          exit 1

      - name: Start TMS service
        run: docker compose -f docker-compose.yml -f docker-compose.full.yml -f docker-compose.edge.yml -f docker-compose.kafka-overlay.yml -f docker-compose.edge-kafka.yml up -d --no-build scm-tms

      - name: Wait for TMS port
        run: |
          for _ in $(seq 1 120); do
            curl -s --connect-timeout 2 http://127.0.0.1:8083/ >/dev/null && exit 0
            if [ -n "$(docker compose -f docker-compose.yml -f docker-compose.full.yml -f docker-compose.edge.yml -f docker-compose.kafka-overlay.yml -f docker-compose.edge-kafka.yml ps -q --status exited scm-tms)" ]; then
              break
            fi
            sleep 3
          done
          docker compose -f docker-compose.yml -f docker-compose.full.yml -f docker-compose.edge.yml -f docker-compose.kafka-overlay.yml -f docker-compose.edge-kafka.yml ps scm-tms
          docker compose -f docker-compose.yml -f docker-compose.full.yml -f docker-compose.edge.yml -f docker-compose.kafka-overlay.yml -f docker-compose.edge-kafka.yml logs --tail=200 scm-tms
          exit 1

      - name: Start ERP service
        run: docker compose -f docker-compose.yml -f docker-compose.full.yml -f docker-compose.edge.yml -f docker-compose.kafka-overlay.yml -f docker-compose.edge-kafka.yml up -d --no-build scm-erp

      - name: Wait for ERP port
        run: |
          for _ in $(seq 1 120); do
            curl -s --connect-timeout 2 http://127.0.0.1:8084/ >/dev/null && exit 0
            if [ -n "$(docker compose -f docker-compose.yml -f docker-compose.full.yml -f docker-compose.edge.yml -f docker-compose.kafka-overlay.yml -f docker-compose.edge-kafka.yml ps -q --status exited scm-erp)" ]; then
              break
            fi
            sleep 3
          done
          docker compose -f docker-compose.yml -f docker-compose.full.yml -f docker-compose.edge.yml -f docker-compose.kafka-overlay.yml -f docker-compose.edge-kafka.yml ps scm-erp
          docker compose -f docker-compose.yml -f docker-compose.full.yml -f docker-compose.edge.yml -f docker-compose.kafka-overlay.yml -f docker-compose.edge-kafka.yml logs --tail=200 scm-erp
          exit 1

      - name: Start OMS and WMS services
        run: docker compose -f docker-compose.yml -f docker-compose.full.yml -f docker-compose.edge.yml -f docker-compose.kafka-overlay.yml -f docker-compose.edge-kafka.yml up -d --no-build scm-oms scm-wms

      - name: Wait for OMS and WMS ports
        run: |
          for _ in $(seq 1 80); do
            curl -s --connect-timeout 2 http://127.0.0.1:8081/ >/dev/null && \
            curl -s --connect-timeout 2 http://127.0.0.1:8082/ >/dev/null && exit 0
            sleep 3
          done
          docker compose -f docker-compose.yml -f docker-compose.full.yml -f docker-compose.edge.yml -f docker-compose.kafka-overlay.yml -f docker-compose.edge-kafka.yml ps scm-oms scm-wms
          docker compose -f docker-compose.yml -f docker-compose.full.yml -f docker-compose.edge.yml -f docker-compose.kafka-overlay.yml -f docker-compose.edge-kafka.yml logs --tail=200 scm-oms scm-wms
          exit 1

      - name: Start mock services
        run: docker compose -f docker-compose.yml -f docker-compose.full.yml -f docker-compose.edge.yml -f docker-compose.kafka-overlay.yml -f docker-compose.edge-kafka.yml up -d --no-build scm-mock-pay scm-mock-carrier scm-mock-inventory

      - name: Start JWT gateway service
        run: docker compose -f docker-compose.yml -f docker-compose.full.yml -f docker-compose.edge.yml -f docker-compose.kafka-overlay.yml -f docker-compose.edge-kafka.yml up -d --no-build scm-gateway-jwt

      - name: Wait for edge + Kafka ports
        run: |
          for _ in $(seq 1 120); do
            ok=1
            for p in 8081 8082 8083 8084 8085 8086 8087 8089 9092; do
              (echo >"/dev/tcp/127.0.0.1/$p") >/dev/null 2>&1 || ok=0
            done
            if [ "$ok" = "1" ]; then
              echo "edge + Kafka stack ready"
              exit 0
            fi
            sleep 5
          done
          echo "edge + Kafka stack timeout" >&2
          docker compose -f docker-compose.yml -f docker-compose.full.yml -f docker-compose.edge.yml -f docker-compose.kafka-overlay.yml -f docker-compose.edge-kafka.yml ps
          docker compose -f docker-compose.yml -f docker-compose.full.yml -f docker-compose.edge.yml -f docker-compose.kafka-overlay.yml -f docker-compose.edge-kafka.yml logs --tail=200
          exit 1

      - name: Cucumber E2E-K05 on edge + Kafka stack
        run: bash scripts/run-e2e-edge-kafka.sh

      - name: Report E2E-K05 diagnostics
        if: failure()
        run: |
          python3 - <<'PY'
          from pathlib import Path

          report_dir = Path("scm-integration-tests/target/surefire-reports")
          reports = sorted(report_dir.glob("*.txt")) + sorted(report_dir.glob("*.xml"))
          if not reports:
              print("::error file=scm-integration-tests::No surefire reports were generated")
              raise SystemExit(0)

          def escape(value: str) -> str:
              return (value.replace("%", "%25")
                           .replace("\r", "%0D")
                           .replace("\n", "%0A"))

          for report in reports[:6]:
              text = report.read_text(encoding="utf-8", errors="replace")
              summary = text[-1800:] if len(text) > 1800 else text
              print(f"::error file={report}::{escape(summary)}")
          PY

      - name: Stop edge + Kafka stack
        if: always()
        run: bash scripts/stop-edge-kafka.sh
