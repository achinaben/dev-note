name: SCM Platform Edge Kafka E2E

on:
  push:
    branches: [cursor/scm-wave, main, master]
    paths:
      - "scm-platform/**"
      - ".github/workflows/scm-platform-edge-kafka.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "scm-platform/**"
      - ".github/workflows/scm-platform-edge-kafka.yml"
  workflow_dispatch:

jobs:
  e2e-edge-kafka-stack:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: scm-platform
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: scm-platform/**/pom.xml

      - name: Check Docker Compose availability
        run: |
          docker version
          docker compose version

      - name: Validate edge + Kafka compose config
        run: docker compose -f docker-compose.yml -f docker-compose.full.yml -f docker-compose.edge.yml -f docker-compose.kafka-overlay.yml -f docker-compose.edge-kafka.yml config --quiet

      - name: Build OpenResty gateway image
        run: docker compose -f docker-compose.yml -f docker-compose.full.yml -f docker-compose.edge.yml -f docker-compose.kafka-overlay.yml -f docker-compose.edge-kafka.yml build scm-gateway-jwt

      - name: Build SCM service images
        run: docker compose -f docker-compose.yml -f docker-compose.full.yml -f docker-compose.edge.yml -f docker-compose.kafka-overlay.yml -f docker-compose.edge-kafka.yml build scm-erp scm-oms scm-wms scm-tms scm-mock-pay scm-mock-carrier scm-mock-inventory

      - name: Start MySQL and Redis infrastructure
        run: docker compose -f docker-compose.yml -f docker-compose.full.yml -f docker-compose.edge.yml -f docker-compose.kafka-overlay.yml -f docker-compose.edge-kafka.yml up -d mysql-erp mysql-oms mysql-wms mysql-tms redis

      - name: Start Kafka infrastructure
        run: docker compose -f docker-compose.yml -f docker-compose.full.yml -f docker-compose.edge.yml -f docker-compose.kafka-overlay.yml -f docker-compose.edge-kafka.yml up -d kafka

      - name: Start Keycloak infrastructure
        run: docker compose -f docker-compose.yml -f docker-compose.full.yml -f docker-compose.edge.yml -f docker-compose.kafka-overlay.yml -f docker-compose.edge-kafka.yml up -d keycloak

      - name: Start ERP and TMS services
        run: docker compose -f docker-compose.yml -f docker-compose.full.yml -f docker-compose.edge.yml -f docker-compose.kafka-overlay.yml -f docker-compose.edge-kafka.yml up -d --no-build --wait --wait-timeout 240 scm-erp scm-tms

      - name: Start OMS and WMS services
        run: docker compose -f docker-compose.yml -f docker-compose.full.yml -f docker-compose.edge.yml -f docker-compose.kafka-overlay.yml -f docker-compose.edge-kafka.yml up -d --no-build --wait --wait-timeout 240 scm-oms scm-wms

      - name: Start mock services
        run: docker compose -f docker-compose.yml -f docker-compose.full.yml -f docker-compose.edge.yml -f docker-compose.kafka-overlay.yml -f docker-compose.edge-kafka.yml up -d --no-build --wait --wait-timeout 180 scm-mock-pay scm-mock-carrier scm-mock-inventory

      - name: Start JWT gateway service
        run: docker compose -f docker-compose.yml -f docker-compose.full.yml -f docker-compose.edge.yml -f docker-compose.kafka-overlay.yml -f docker-compose.edge-kafka.yml up -d --no-build --wait --wait-timeout 180 scm-gateway-jwt

      - name: Wait for edge + Kafka ports
        run: |
          for _ in $(seq 1 120); do
            ok=1
            for p in 8081 8082 8083 8084 8085 8086 8087 8089 9092; do
              (echo >"/dev/tcp/127.0.0.1/$p") >/dev/null 2>&1 || ok=0
            done
            if [ "$ok" = "1" ]; then
              echo "edge + Kafka stack ready"
              exit 0
            fi
            sleep 5
          done
          echo "edge + Kafka stack timeout" >&2
          docker compose -f docker-compose.yml -f docker-compose.full.yml -f docker-compose.edge.yml -f docker-compose.kafka-overlay.yml -f docker-compose.edge-kafka.yml ps
          docker compose -f docker-compose.yml -f docker-compose.full.yml -f docker-compose.edge.yml -f docker-compose.kafka-overlay.yml -f docker-compose.edge-kafka.yml logs --tail=200
          exit 1

      - name: Cucumber E2E-K05 on edge + Kafka stack
        run: bash scripts/run-e2e-edge-kafka.sh

      - name: Stop edge + Kafka stack
        if: always()
        run: bash scripts/stop-edge-kafka.sh
