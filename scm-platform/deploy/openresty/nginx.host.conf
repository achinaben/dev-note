# OpenResty 网关 — 宿主机四服务（与 start-all 联调）

lua_package_path "/etc/nginx/lua/?.lua;;";
lua_shared_dict discovery 1m;
lua_shared_dict jwks 2m;
lua_shared_dict jwt_verification 2m;
resolver 127.0.0.11 ipv6=off valid=30s;
lua_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
lua_ssl_verify_depth 5;


upstream scm_oms { server host.docker.internal:8081; }
upstream scm_wms { server host.docker.internal:8082; }
upstream scm_tms { server host.docker.internal:8083; }
upstream scm_erp { server host.docker.internal:8084; }

server {
    listen 8080;
    server_name scm.local;

    set $scm_auth_ok 0;
    if ($http_x_api_key = "e2e-gateway-key") { set $scm_auth_ok 1; }
    if ($http_x_api_key = "prod-integration-key") { set $scm_auth_ok 1; }
    if ($scm_auth_ok = 0) { return 401; }

    location /api/v1/orders {
        access_by_lua_block {
            local jwt = require "jwt-auth"
            jwt.validate("oms.write", true)
        }
        proxy_pass http://scm_oms;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Org-Id $http_x_org_id;
        proxy_set_header Idempotency-Key $http_idempotency_key;
        proxy_set_header X-Api-Key $http_x_api_key;
    }

    location /api/v1/ {
        proxy_pass http://scm_oms;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Org-Id $http_x_org_id;
        proxy_set_header Idempotency-Key $http_idempotency_key;
        proxy_set_header X-Api-Key $http_x_api_key;
    }

    location /wms/v1/ {
        access_by_lua_block {
            local jwt = require "jwt-auth"
            jwt.validate("wms.write", true)
        }
        proxy_pass http://scm_wms;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Api-Key $http_x_api_key;
    }

    location /tms/v1/ {
        proxy_pass http://scm_tms;
    }

    location /api/v1/integration/ {
        proxy_pass http://scm_erp;
    }
}
