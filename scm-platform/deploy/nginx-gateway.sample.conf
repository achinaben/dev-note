# Nginx 统一入口样例 :8080 — 鉴权 + 限流 + 反向代理
# 用法：替换 upstream 地址后 include 到 http{} 或单独 server{}

limit_req_zone $binary_remote_addr zone=scm_api:10m rate=100r/s;

map $http_x_api_key $scm_auth_ok {
    default 0;
    "e2e-gateway-key" 1;
    "prod-integration-key" 1;
}

server {
    listen 8080;
    server_name scm.local;

    if ($scm_auth_ok = 0) {
        return 401;
    }

    location /api/v1/ {
        limit_req zone=scm_api burst=200 nodelay;
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Org-Id $http_x_org_id;
        proxy_set_header Idempotency-Key $http_idempotency_key;
        proxy_set_header X-Api-Key $http_x_api_key;
    }

    location /wms/v1/ {
        limit_req zone=scm_api burst=200 nodelay;
        proxy_pass http://127.0.0.1:8082;
    }

    location /tms/v1/ {
        limit_req zone=scm_api burst=200 nodelay;
        proxy_pass http://127.0.0.1:8083;
    }

    # ERP 集成接口优先于通用 /api/v1/
    location /api/v1/integration/ {
        limit_req zone=scm_api burst=200 nodelay;
        proxy_pass http://127.0.0.1:8084;
    }
}
