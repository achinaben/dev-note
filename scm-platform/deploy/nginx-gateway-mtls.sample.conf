# 网关 mTLS 样例（与 mtls-integration.md 配套，仅预发/生产参考）
# 本地默认仍用 deploy/nginx-gateway.docker.conf（HTTP + X-Api-Key）
server {
    listen 8443 ssl;
    server_name scm.local;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_client_certificate /etc/nginx/certs/ca.crt;
    ssl_verify_client optional;
    ssl_protocols TLSv1.2 TLSv1.3;

    set $scm_auth_ok 0;
    if ($http_x_api_key = "e2e-gateway-key") { set $scm_auth_ok 1; }
    if ($http_x_api_key = "prod-integration-key") { set $scm_auth_ok 1; }
    if ($scm_auth_ok = 0) { return 401; }

    # 集成路由：要求客户端证书（东西向）
    location /api/v1/integration/ {
        if ($ssl_client_verify != SUCCESS) { return 403; }
        proxy_pass http://127.0.0.1:8084;
        proxy_set_header X-Integration-Key $http_x_integration_key;
    }

    location /api/v1/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Idempotency-Key $http_idempotency_key;
    }
}
