# Nginx 网关 — JWT auth_request 校验（需 OMS profile jwt + /internal/v1/jwt/check）
server {
    listen 8080;
    server_name scm.local;

    set $scm_auth_ok 0;
    if ($http_x_api_key = "e2e-gateway-key") { set $scm_auth_ok 1; }
    if ($http_x_api_key = "prod-integration-key") { set $scm_auth_ok 1; }
    if ($scm_auth_ok = 0) { return 401; }

    location = /_scm_jwt_auth {
        internal;
        proxy_pass http://host.docker.internal:8081/internal/v1/jwt/check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Authorization $http_authorization;
    }

    location = /api/v1/orders {
        auth_request /_scm_jwt_auth;
        proxy_pass http://host.docker.internal:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Org-Id $http_x_org_id;
        proxy_set_header Idempotency-Key $http_idempotency_key;
        proxy_set_header X-Api-Key $http_x_api_key;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/v1/ {
        proxy_pass http://host.docker.internal:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Org-Id $http_x_org_id;
        proxy_set_header Idempotency-Key $http_idempotency_key;
        proxy_set_header X-Api-Key $http_x_api_key;
        proxy_set_header Authorization $http_authorization;
    }

    location /wms/v1/ {
        proxy_pass http://host.docker.internal:8082;
    }

    location /tms/v1/ {
        proxy_pass http://host.docker.internal:8083;
    }

    location /api/v1/integration/ {
        proxy_pass http://host.docker.internal:8084;
    }
}
