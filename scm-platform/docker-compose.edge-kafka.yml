# Final overlay for edge + Kafka stacks. Keep this file last so the OMS
# profile keeps Kafka event processing enabled for E2E-K05. JWT gateway
# behavior is covered by the gateway-specific E2E suite.
services:
  scm-gateway:
    profiles: ["legacy-gateway"]

  scm-oms:
    environment:
      SPRING_PROFILES_ACTIVE: jdbc,docker,kafka,docker-kafka
