# 本地 OpenResty JWT 网关（后端在宿主机 start-all）。用法见 scripts/start-gateway-jwt.ps1
services:
  scm-gateway-jwt:
    build:
      context: ./deploy/openresty
      dockerfile: Dockerfile
    ports: ["8089:8080"]
    environment:
      SCM_JWT_ISSUER: http://localhost:8180/realms/scm
      SCM_JWT_JWKS_URI: http://host.docker.internal:8180/realms/scm/protocol/openid-connect/certs
    volumes:
      - ./deploy/openresty/nginx.host.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
